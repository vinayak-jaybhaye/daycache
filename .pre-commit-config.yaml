repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------------
  # Python — ruff (lint + format)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  # ---------------------------------------------------------------------------
  # TypeScript — Prettier (format)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: bash -c 'cd apps/web && pnpm exec prettier --write .'
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # TypeScript — ESLint (lint)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: bash -c 'cd apps/web && pnpm exec eslint --max-warnings 0 .'
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # TypeScript — Type Check
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: tsc
        name: typescript-check
        language: node
        entry: bash -c 'cd apps/web && pnpm exec tsc --noEmit'
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Python — Pyright (type check)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        language: system
        entry: bash -c 'cd apps/api && uv run pyright'
        types: [python]
        files: ^apps/api/
        pass_filenames: false
