repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---------------------------------------------------------------------------
  # Python — ruff (lint + format)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^apps/api/
      - id: ruff-format
        files: ^apps/api/

  # ---------------------------------------------------------------------------
  # TypeScript — Prettier (format)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: pnpm --filter @daycache/web prettier --write
        types_or: [javascript, jsx, ts, tsx, css, json, markdown, yaml]
        files: ^apps/web/
        additional_dependencies: []
        pass_filenames: true

  # ---------------------------------------------------------------------------
  # TypeScript — ESLint (lint)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: pnpm --filter @daycache/web eslint --max-warnings 0
        types_or: [javascript, jsx, ts, tsx]
        files: ^apps/web/
        additional_dependencies: []
        pass_filenames: true
