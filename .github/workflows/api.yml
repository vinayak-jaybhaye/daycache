name: API

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/api.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run --directory apps/api ruff check apps/api/

      - name: Ruff format check
        run: uv run --directory apps/api ruff format --check apps/api/

  type-check:
    name: Type check (Pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Pyright
        run: uv run --directory apps/api pyright

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: daycache
          POSTGRES_PASSWORD: daycache
          POSTGRES_DB: daycache_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://daycache:daycache@localhost:5432/daycache_test
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --tb=short
