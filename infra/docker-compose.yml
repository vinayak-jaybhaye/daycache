services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-daycache}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-daycache}
      POSTGRES_DB: ${POSTGRES_DB:-daycache}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf

  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      # Only boot the S3 service — keeps startup fast.
      SERVICES: s3
      DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      # Bucket name forwarded into the init script.
      S3_BUCKET: ${S3_BUCKET:-daycache-media}
      # Persist state across restarts.
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      # Runs automatically when LocalStack is ready.
      - ./localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  localstack_data:
