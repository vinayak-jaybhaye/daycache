# Root pyproject.toml — uv workspace configuration.
# Tool configs here are shared defaults; each app can override in its own pyproject.toml.

[tool.uv.workspace]
members = ["apps/api"]

# ---------------------------------------------------------------------------
# Ruff — shared defaults (apps/api overrides these locally)
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
